apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "raven.fullname" . }}-config
  labels:
    {{- include "raven.labels" . | nindent 4 }}
data:
  RAVEN_ENVIRONMENT: {{ .Values.config.environment | quote }}
  DEBUG: {{ .Values.config.debug | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  JWT_ALGORITHM: {{ .Values.config.jwtAlgorithm | quote }}
  JWT_ACCESS_TTL_MINUTES: {{ .Values.config.jwtAccessTtlMinutes | quote }}
  JWT_REFRESH_TTL_DAYS: {{ .Values.config.jwtRefreshTtlDays | quote }}
  JWT_ISSUER: {{ .Values.config.jwtIssuer | quote }}
  JWT_AUDIENCE: {{ .Values.config.jwtAudience | quote }}
  CORS_ORIGINS: {{ join "," .Values.config.corsOrigins | quote }}
  SCAN_ROOT: {{ .Values.config.scanRoot | quote }}
  AI_ALLOWED_BASE_URLS: {{ join "," .Values.config.aiAllowedBaseUrls | quote }}
  RATE_LIMIT_PER_MINUTE: {{ .Values.config.rateLimitPerMinute | quote }}
  RATE_LIMIT_AUTH_PER_MINUTE: {{ .Values.config.rateLimitAuthPerMinute | quote }}
  AI_PROVIDER: {{ .Values.config.aiProvider | quote }}
  AI_MODEL: {{ .Values.config.aiModel | quote }}
  AI_TIMEOUT: {{ .Values.config.aiTimeout | quote }}
  AI_SYSTEM_PROMPT_PATH: {{ .Values.config.aiSystemPromptPath | quote }}
  {{- if .Values.observability.otelEndpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otelEndpoint | quote }}
  {{- end }}
