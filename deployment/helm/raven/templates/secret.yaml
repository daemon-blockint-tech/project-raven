{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "raven.fullname" . }}
  labels:
    {{- include "raven.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.secrets.bootstrapAdminPassword | quote }}
  AI_API_KEY: {{ .Values.secrets.aiApiKey | quote }}
  SHODAN_API_KEY: {{ .Values.secrets.shodanApiKey | quote }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
{{- end }}
