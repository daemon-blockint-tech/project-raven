name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Static analysis
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: |
          pip install -U pip
          pip install ruff mypy bandit

      - name: ruff
        run: ruff check raven/ tests/

      - name: mypy
        run: mypy raven/ --ignore-missing-imports --no-strict-optional || true   # ratchet from current state

      - name: bandit (security)
        run: bandit -r raven/ -ll -ii -x raven/ml/variant_analyzer.py,raven/ml/code_flow_scanner.py

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          pip install -U pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=raven \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage
        if: matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Container build + Trivy + SBOM
  # ---------------------------------------------------------------------------
  container:
    name: Container build & scan
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository }}:ci-${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}:ci-${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:ci-${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true

  # ---------------------------------------------------------------------------
  # Helm chart lint
  # ---------------------------------------------------------------------------
  helm:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: helm lint
        run: helm lint deployment/helm/raven

      - name: helm template (smoke render)
        run: helm template raven deployment/helm/raven --debug > /tmp/rendered.yaml

      - uses: instrumenta/kubeval-action@master
        continue-on-error: true
        with:
          files: /tmp/rendered.yaml
