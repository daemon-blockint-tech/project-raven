name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write
  id-token: write    # for cosign keyless signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Container — multi-arch build + push + sign
      # ---------------------------------------------------------------
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build & push (linux/amd64 + arm64)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via Sigstore)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      # ---------------------------------------------------------------
      # Helm chart — package + push to OCI registry
      # ---------------------------------------------------------------
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Package + push Helm chart
        run: |
          helm package deployment/helm/raven --version "${{ steps.ver.outputs.version }}" --app-version "${{ steps.ver.outputs.version }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push "raven-${{ steps.ver.outputs.version }}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"

      # ---------------------------------------------------------------
      # GitHub Release notes
      # ---------------------------------------------------------------
      - name: Generate release notes
        uses: release-drafter/release-drafter@v6
        with:
          tag: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
