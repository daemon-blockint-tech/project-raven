version: "3.8"

# =============================================================================
# Local development compose — mirrors the production K8s topology.
# For real deployments use the Helm chart at deployment/helm/raven.
# =============================================================================

services:
  raven-api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
      - "9090:9090"
    environment:
      RAVEN_ENVIRONMENT: dev
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql://raven:${POSTGRES_PASSWORD:-ravendevpass}@db:5432/raven}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-random-32-char-or-longer-string}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      AI_MODEL: ${AI_MODEL:-openrouter/auto}
      AI_API_KEY: ${AI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-https://raven.local}
      OPENROUTER_TITLE: ${OPENROUTER_TITLE:-Project Raven}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      SCAN_ROOT: /var/lib/raven/repos
      WHOIS_TIMEOUT: ${WHOIS_TIMEOUT:-15}
      CYBERCHEF_URL: ${CYBERCHEF_URL:-http://cyberchef:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - raven_logs:/var/log/raven
      - raven_data:/var/lib/raven
    read_only: true
    tmpfs:
      - /tmp/raven:size=256m
    user: "10001:10001"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    networks:
      - raven-net

  cyberchef:
    image: mpepping/cyberchef:latest
    ports:
      - "3000:3000"
    networks:
      - raven-net
    profiles:
      - tools

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: raven
      POSTGRES_USER: raven
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ravendevpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "raven"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - raven-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - raven-net

volumes:
  postgres_data:
  raven_logs:
  raven_data:

networks:
  raven-net:
    driver: bridge
